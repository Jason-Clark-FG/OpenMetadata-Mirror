name: Setup OpenMetadata Test Environment
description: Steps needed to have a coherent test environment

inputs:
  python-version:
    description: Python Version to install
    required: true
  java-version:
    description: Java Version to install
    default: '21'
  npm-version:
    description: NPM Version to install
    default: 'v22.x'
  args:
    description: Arguments to pass to run_local_docker.sh
    required: false
    default: "-m no-ui -d mysql"  # Use "-d postgresql" for postgres and Opensearch
  ingestion_dependency:
    description: Ingestion dependency to pass to run_local_docker.sh
    required: false
    default: "mysql,elasticsearch,sample-data"
  install-server:
    description: Whether to install Java, Node, and the OpenMetadata server
    required: false
    default: "true"
  install-mode:
    description: "'full' installs [all]+[test] extras; 'dev-only' installs only [dev] (sufficient for static checks)"
    required: false
    default: "full"

runs:
  using: composite
  steps:
    # ---- Install Ubuntu Dependencies ---------------------------------------------
    - name: Cache and install Ubuntu dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: unixodbc-dev python3-venv librdkafka-dev gcc libsasl2-dev build-essential libssl-dev libffi-dev libevent-dev python3-dev libkrb5-dev tdsodbc
        version: 1.0

    - name: Install msodbcsql18
      if: ${{ inputs.install-mode == 'full' }}
      run: ACCEPT_EULA=Y sudo apt-get -qq install -y msodbcsql18
      shell: bash
    # ------------------------------------------------------------------------------

    # ---- Setup Java --------------------------------------------------------------
    - name: Setup JDK ${{ inputs.java-version }}
      if: ${{ inputs.install-server == 'true' }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
    # ------------------------------------------------------------------------------

    # ---- Setup Node --------------------------------------------------------------
    - name: Use Node.js ${{ inputs.npm-version }}
      if: ${{ inputs.install-server == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.npm-version }}

    - name: Install yarn
      if: ${{ inputs.install-server == 'true' }}
      run: npm install -g yarn
      shell: bash
    # ------------------------------------------------------------------------------

    # ---- Setup Python Test Environment -------------------------------------------
    - name: Setup Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Restore Python venv cache
      id: cache-venv
      uses: actions/cache/restore@v4
      with:
        path: env/
        key: venv-${{ runner.os }}-py${{ inputs.python-version }}-${{ inputs.install-mode }}-${{ hashFiles('ingestion/setup.py', 'ingestion/pyproject.toml') }}

    - name: Create venv and install dev dependencies
      if: steps.cache-venv.outputs.cache-hit != 'true'
      run: |
        python3 -m venv env
        source env/bin/activate
        uv pip install "${{ github.workspace }}/ingestion[dev]"
      shell: bash

    - name: Restore Generated Models Cache
      id: cache-generated
      uses: actions/cache/restore@v4
      with:
        path: ingestion/src/metadata/generated
        key: ${{ runner.os }}-generated-${{ hashFiles(
               'openmetadata-spec/src/main/resources/json/schema/**',
               'openmetadata-spec/src/main/antlr4/**/*.g4',
               'scripts/datamodel_generation.py',
               'ingestion/setup.py',
               'Makefile'
             ) }}

    - name: Generate Models
      if: steps.cache-generated.outputs.cache-hit != 'true'
      run: |
        source env/bin/activate
        sudo make install_antlr_cli
        make generate
      shell: bash

    - name: Save Generated Models Cache
      if: steps.cache-generated.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: actions/cache/save@v4
      with:
        path: ingestion/src/metadata/generated
        key: ${{ runner.os }}-generated-${{ hashFiles(
               'openmetadata-spec/src/main/resources/json/schema/**',
               'openmetadata-spec/src/main/antlr4/**/*.g4',
               'scripts/datamodel_generation.py',
               'ingestion/setup.py',
               'Makefile'
             ) }}

    - name: Install Python Dependencies
      if: ${{ inputs.install-mode == 'full' && steps.cache-venv.outputs.cache-hit != 'true' }}
      run: |
        source env/bin/activate
        uv pip install "setuptools<81"
        uv pip install --no-build-isolation "cx_Oracle>=8.3.0,<9"
        uv pip install --no-deps "sqlalchemy-redshift==0.8.14" "sqlalchemy-databricks==0.2.0" "sqlalchemy-ibmi==0.9.3" "pydoris-custom==1.1.0"
        uv pip install "${{ github.workspace }}/ingestion[all]"
        uv pip install "${{ github.workspace }}/ingestion[test]"
        uv pip install nox
      shell: bash

    - name: Install nox (dev-only mode)
      if: ${{ inputs.install-mode != 'full' && steps.cache-venv.outputs.cache-hit != 'true' }}
      run: |
        source env/bin/activate
        uv pip install nox pandas
      shell: bash

    - name: Save Python venv cache
      if: steps.cache-venv.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: actions/cache/save@v4
      with:
        path: env/
        key: venv-${{ runner.os }}-py${{ inputs.python-version }}-${{ inputs.install-mode }}-${{ hashFiles('ingestion/setup.py', 'ingestion/pyproject.toml') }}
    # ------------------------------------------------------------------------------

    # ---- Start OpenMetadata Server and ingest Sample Data ------------------------
    - name: Start Server and Ingest Sample Data
      if: ${{ inputs.install-server == 'true' }}
      uses: nick-fields/retry@v3.0.2
      env:
        INGESTION_DEPENDENCY: ${{ inputs.ingestion_dependency }}
      with:
        timeout_minutes: 60
        max_attempts: 2
        retry_on: error
        command: ./docker/run_local_docker.sh ${{ inputs.args }}
