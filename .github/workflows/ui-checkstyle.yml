name: UI Checkstyle

on:
  # Trigger analysis when creating or updating a pull request.
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "openmetadata-ui/src/main/resources/ui/**"
      - "openmetadata-spec/src/main/resources/json/schema/**"
      - ".github/workflows/ui-checkstyle.yml"
      - openmetadata-ui/src/main/resources/ui/playwright/**
      - openmetadata-ui/src/main/resources/ui/eslint.config.mjs

permissions:
  contents: read

concurrency:
  group: ui-checkstyle-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  UI_WORKING_DIRECTORY: openmetadata-ui/src/main/resources/ui

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Authorize (Check Labels)
  # ──────────────────────────────────────────────────────────────────────────
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the labeler
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: Team Label
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 90

      - name: Verify PR labels
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: jesusvasquez333/verify-pr-label-action@v1.4.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          valid-labels: "safe to test"
          pull-request-number: "${{ github.event.pull_request.number }}"
          disable-reviews: true

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: UI Style Checks (One Job, Separate Steps)
  # ──────────────────────────────────────────────────────────────────────────
  ui-checkstyle:
    needs: authorize
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Install Antlr4 CLI
        run: sudo make install_antlr_cli

      - name: Install Yarn Packages
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn install --frozen-lockfile

      # ──────────────────────────────────────────────────────────────────────────
      # Step 3: Linting Sub-Group
      # ──────────────────────────────────────────────────────────────────────────
      - name: Get changed UI files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          path: ${{ env.UI_WORKING_DIRECTORY }}
          files: |
            src/**/*.{ts,tsx,js,jsx}

      - name: Linting (ESlint + Prettier + Organise Imports)
        id: linting
        if: steps.changed-files.outputs.any_changed == 'true'
        continue-on-error: true
        working-directory: ${{ env.UI_WORKING_DIRECTORY }}
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          yarn organize-imports-cli $CHANGED_FILES
          NODE_OPTIONS="--max-old-space-size=8192" yarn eslint --fix --no-error-on-unmatched-pattern $CHANGED_FILES
          yarn prettier --write --ignore-path './.prettierignore' $CHANGED_FILES
          yarn tsc --noEmit
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "### 🔍 Debug: Changes detected in Linting (ESlint + Prettier + Organise Imports)"
            git status --porcelain
            git diff
          fi
          git checkout -- .
          git clean -fd

      - name: Get changed Playwright files
        id: changed-files-playwright
        uses: tj-actions/changed-files@v44
        with:
          path: ${{ env.UI_WORKING_DIRECTORY }}
          files: |
            playwright/**/*.{ts,tsx,js,jsx}

      - name: Playwright ESLint Check
        id: playwright-linting
        if: steps.changed-files-playwright.outputs.any_changed == 'true'
        continue-on-error: true
        working-directory: ${{ env.UI_WORKING_DIRECTORY }}
        env:
          CHANGED_FILES: ${{ steps.changed-files-playwright.outputs.all_changed_files }}
        run: |
          yarn organize-imports-cli $CHANGED_FILES
          NODE_OPTIONS="--max-old-space-size=8192" yarn eslint --fix --no-error-on-unmatched-pattern $CHANGED_FILES
          yarn prettier --write --ignore-path './.prettierignore' $CHANGED_FILES
          yarn tsc --project playwright/tsconfig.json --noEmit
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "### 🔍 Debug: Changes detected in Playwright Linting"
            git status --porcelain
            git diff
          fi
          git checkout -- .
          git clean -fd

      - name: Get all changed UI files
        id: changed-files-all
        uses: tj-actions/changed-files@v44
        with:
          path: ${{ env.UI_WORKING_DIRECTORY }}

      - name: Linting - Licence header
        id: license
        if: steps.changed-files-all.outputs.any_changed == 'true'
        continue-on-error: true
        working-directory: ${{ env.UI_WORKING_DIRECTORY }}
        env:
          CHANGED_FILES_ALL: ${{ steps.changed-files-all.outputs.all_changed_files }}
        run: |
          yarn license-header-fix $CHANGED_FILES_ALL
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "### 🔍 Debug: Changes detected in Licence Headers"
            git status --porcelain
            git diff
          fi
          git checkout -- .
          git clean -fd


      # ──────────────────────────────────────────────────────────────────────────
      # Step 4: I18n Sync
      # ──────────────────────────────────────────────────────────────────────────
      - name: I18n sync
        id: i18n
        continue-on-error: true
        working-directory: ${{ env.UI_WORKING_DIRECTORY }}
        run: |
          yarn i18n
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "### 🔍 Debug: Changes detected in I18n sync"
            git status --porcelain
            git diff
          fi
          git checkout -- .
          git clean -fd

      # ──────────────────────────────────────────────────────────────────────────
      # Step 5: generate:app-docs
      # ──────────────────────────────────────────────────────────────────────────
      - name: generate:app-docs
        id: docs
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn generate:app-docs
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "### 🔍 Debug: Changes detected in App Docs"
            git status --porcelain
            git diff
          fi
          git checkout -- .
          git clean -fd

      # ──────────────────────────────────────────────────────────────────────────
      # Step 6: Unified Reporting
      # ──────────────────────────────────────────────────────────────────────────
      - name: Find Existing UI Check Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '### 🔍 UI Style Check Summary'

      - name: Create or Update Summary Comment
        if: steps.linting.outputs.changes == 'true' || steps.playwright-linting.outputs.changes == 'true' || steps.license.outputs.changes == 'true' || steps.i18n.outputs.changes == 'true' || steps.docs.outputs.changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🔍 UI Style Check Summary

            One or more UI style checks have failed. Please run the indicated commands in `openmetadata-ui/src/main/resources/ui`:

            - **UI check style**
              - **Linting**
                - ${{ steps.linting.outputs.changes == 'true' && '❌' || '✅' }} **ESlint + Prettier + Organise Imports**
                - ${{ steps.playwright-linting.outputs.changes == 'true' && '❌' || '✅' }} **Playwright ESLint + Prettier**
                - ${{ steps.license.outputs.changes == 'true' && '❌' || '✅' }} **Licence header**
              - ${{ steps.i18n.outputs.changes == 'true' && '❌' || '✅' }} **I18n sync**
              - ${{ steps.docs.outputs.changes == 'true' && '❌' || '✅' }} **generate:app-docs**
            
            **💡 Easy Fix:**
            Run the following single command locally to automatically fix all code styling issues across the workspace:
            ```bash
            yarn ui-checkstyle
            ```
          edit-mode: replace

      - name: Delete Summary Comment if Passed
        if: steps.linting.outputs.changes != 'true' && steps.playwright-linting.outputs.changes != 'true' && steps.license.outputs.changes != 'true' && steps.i18n.outputs.changes != 'true' && steps.docs.outputs.changes != 'true' && steps.fc.outputs.comment-id != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.fc.outputs.comment-id }}
            })

      - name: Fail if any check detected changes or failed
        if: steps.linting.outputs.changes == 'true' || steps.playwright-linting.outputs.changes == 'true' || steps.license.outputs.changes == 'true' || steps.i18n.outputs.changes == 'true' || steps.docs.outputs.changes == 'true' || steps.linting.outcome != 'success' || steps.playwright-linting.outcome != 'success' || steps.license.outcome != 'success' || steps.i18n.outcome != 'success' || steps.docs.outcome != 'success'
        run: |
          echo "One or more checkstyle steps introduced changes or did not complete successfully."
          exit 1
