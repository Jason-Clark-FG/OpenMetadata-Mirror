name: UI Checkstyle

on:
  workflow_dispatch:
  # Trigger analysis when creating or updating a pull request.
  pull_request_target:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "openmetadata-ui/src/main/resources/ui/**"
      - ".github/workflows/ui-checkstyle.yml"

permissions:
  contents: read

concurrency:
  group: ui-checkstyle-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Detect which UI source files were changed in the PR
  # ──────────────────────────────────────────────────────────────────────────
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      # Space-separated list of changed source files (for eslint / prettier / organize-imports)
      src_files: ${{ steps.changed.outputs.all_changed_files }}
      src_files_count: ${{ steps.changed.outputs.all_changed_files_count }}
      # Space-separated unique directories that contain changed files (for license-header-check)
      src_dirs: ${{ steps.dirs.outputs.dirs }}
    steps:
      - name: Wait for the labeler
        uses: lewagon/wait-on-check-action@v1.3.4
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: Team Label
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 90

      - name: Verify PR labels
        uses: jesusvasquez333/verify-pr-label-action@v1.4.0
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          valid-labels: "safe to test"
          pull-request-number: "${{ github.event.pull_request.number }}"
          disable-reviews: true

      - name: Checkout
        uses: actions/checkout@v4
        if: success()
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          # Need fetch-depth > 1 so changed-files can diff against the base
          fetch-depth: 0

      - name: Get changed UI source files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            openmetadata-ui/src/main/resources/ui/src/**/*.ts
            openmetadata-ui/src/main/resources/ui/src/**/*.tsx
            openmetadata-ui/src/main/resources/ui/src/**/*.js
            openmetadata-ui/src/main/resources/ui/src/**/*.jsx
            openmetadata-ui/src/main/resources/ui/src/**/*.json
          separator: " "

      - name: Derive unique parent directories for license-header check
        id: dirs
        if: steps.changed.outputs.all_changed_files_count > 0
        run: |
          FILES="${{ steps.changed.outputs.all_changed_files }}"
          DIRS=$(echo "$FILES" | tr ' ' '\n' | xargs -I{} dirname {} | sort -u | tr '\n' ' ')
          echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # Setup: install dependencies once, cache for all check jobs
  # ──────────────────────────────────────────────────────────────────────────
  setup:
    needs: changed-files
    # Skip the whole setup (and all downstream jobs) if no source files changed
    if: needs.changed-files.outputs.src_files_count > 0
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
          docker-images: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Install Antlr4 CLI
        run: |
          sudo make install_antlr_cli

      - name: Install Yarn Packages
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # Check 1: ESLint — only on changed files
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    needs: [changed-files, setup]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run ESLint on changed files
        id: lint
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        env:
          CHANGED_FILES: ${{ needs.changed-files.outputs.src_files }}
        run: |
          NODE_OPTIONS='--max-old-space-size=8192' npx eslint $CHANGED_FILES

      - name: Comment on PR (ESLint failure)
        if: steps.lint.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ ESLint Check Failed

            Fix ESLint issues in the changed files by running:
            ```bash
            cd openmetadata-ui/src/main/resources/ui
            yarn run lint:fix
            ```
            Then commit the changes to this PR.

            > 💡 Use [pre-commit](https://pre-commit.com/) hooks to automate this: `make install_test precommit_install`

      - name: Fail job if ESLint failed
        if: steps.lint.outcome != 'success'
        run: exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Check 2: Prettier — only on changed files
  # ──────────────────────────────────────────────────────────────────────────
  prettier:
    needs: [changed-files, setup]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Prettier on changed files
        id: prettier
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        env:
          CHANGED_FILES: ${{ needs.changed-files.outputs.src_files }}
        run: |
          npx prettier --config ./.prettierrc.yaml --ignore-path ./.prettierignore --check $CHANGED_FILES

      - name: Comment on PR (Prettier failure)
        if: steps.prettier.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ Prettier Check Failed

            Fix Prettier formatting in the changed files by running:
            ```bash
            cd openmetadata-ui/src/main/resources/ui
            yarn run pretty
            ```
            Then commit the changes to this PR.

            > 💡 Use [pre-commit](https://pre-commit.com/) hooks to automate this: `make install_test precommit_install`

      - name: Fail job if Prettier failed
        if: steps.prettier.outcome != 'success'
        run: exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Check 3: License Headers — on directories containing changed files
  # ──────────────────────────────────────────────────────────────────────────
  license-header:
    needs: [changed-files, setup]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run License Header Check on changed files
        id: license-header
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        env:
          CHANGED_FILES: ${{ needs.changed-files.outputs.src_files }}
        run: |
          # license-check-and-add doesn't support individual file args,
          # so we check each changed file directly via its Node API.
          echo "$CHANGED_FILES" | tr ' ' '\n' | while read -r f; do
            # Resolve the path relative to the repo root
            npx license-check-and-add check -f .licenseheaderrc.json "$f"
          done

      - name: Comment on PR (License Header failure)
        if: steps.license-header.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ License Header Check Failed

            One or more changed files are missing the required license header. Fix them by running:
            ```bash
            cd openmetadata-ui/src/main/resources/ui
            yarn run license-header-fix
            ```
            Then commit the changes to this PR.

            > 💡 Use [pre-commit](https://pre-commit.com/) hooks to automate this: `make install_test precommit_install`

      - name: Fail job if License Header check failed
        if: steps.license-header.outcome != 'success'
        run: exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Check 4: Organize Imports — only on changed .ts/.tsx files
  # ──────────────────────────────────────────────────────────────────────────
  organize-imports:
    needs: [changed-files, setup]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Filter changed files to .ts/.tsx only
        id: ts-files
        env:
          CHANGED_FILES: ${{ needs.changed-files.outputs.src_files }}
        run: |
          TS_FILES=$(echo "$CHANGED_FILES" | tr ' ' '\n' | grep -E '\.(ts|tsx)$' | tr '\n' ' ')
          echo "files=$TS_FILES" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$TS_FILES" | wc -w | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Run Organize Imports on changed .ts/.tsx files
        id: organize-imports
        if: steps.ts-files.outputs.count > 0
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        env:
          TS_FILES: ${{ steps.ts-files.outputs.files }}
        run: |
          npx organize-imports-cli $TS_FILES --list-different

      - name: Comment on PR (Organize Imports failure)
        if: steps.organize-imports.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ Organize Imports Check Failed

            Fix import ordering in the changed files by running:
            ```bash
            cd openmetadata-ui/src/main/resources/ui
            yarn run organize-imports
            ```
            Then commit the changes to this PR.

            > 💡 Use [pre-commit](https://pre-commit.com/) hooks to automate this: `make install_test precommit_install`

      - name: Fail job if Organize Imports check failed
        if: steps.organize-imports.outcome != 'success'
        run: exit 1
