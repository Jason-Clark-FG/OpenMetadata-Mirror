name: UI Checkstyle

on:
  workflow_dispatch:
  # Trigger analysis when creating or updating a pull request.
  pull_request_target:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - synchronize
    paths:
      - "openmetadata-ui/src/main/resources/ui/**"
      - "openmetadata-spec/src/main/resources/json/schema/**"
      - ".github/workflows/ui-checkstyle.yml"

permissions:
  contents: read

concurrency:
  group: ui-checkstyle-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Authorize (Check Labels)
  # ──────────────────────────────────────────────────────────────────────────
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the labeler
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: Team Label
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 90

      - name: Verify PR labels
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: jesusvasquez333/verify-pr-label-action@v1.4.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          valid-labels: "safe to test"
          pull-request-number: "${{ github.event.pull_request.number }}"
          disable-reviews: true

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: UI Style Checks (One Job, Separate Steps)
  # ──────────────────────────────────────────────────────────────────────────
  ui-checkstyle:
    needs: authorize
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Install Antlr4 CLI
        run: sudo make install_antlr_cli

      - name: Install Yarn Packages
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn install --frozen-lockfile

      # ──────────────────────────────────────────────────────────────────────────
      # Step 3: Linting Sub-Group
      # ──────────────────────────────────────────────────────────────────────────
      - name: Linting - Organise Import CLI
        id: organize_imports
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn organize-imports
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi
          git checkout -- .
          git clean -fd

      - name: Linting - ESlint + Prettier
        id: lint_pretty
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn lint:fix
          yarn pretty
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi
          git checkout -- .
          git clean -fd

      - name: Linting - Licence header
        id: license
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn license-header-fix
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi
          git checkout -- .
          git clean -fd

      # ──────────────────────────────────────────────────────────────────────────
      # Step 4: I18n Sync
      # ──────────────────────────────────────────────────────────────────────────
      - name: I18n sync
        id: i18n
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn i18n
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi
          git checkout -- .
          git clean -fd

      # ──────────────────────────────────────────────────────────────────────────
      # Step 5: generate:app-docs
      # ──────────────────────────────────────────────────────────────────────────
      - name: generate:app-docs
        id: docs
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn generate:app-docs
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi
          git checkout -- .
          git clean -fd

      # ──────────────────────────────────────────────────────────────────────────
      # Step 6: Unified Reporting
      # ──────────────────────────────────────────────────────────────────────────
      - name: Find Existing UI Check Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '### 🔍 UI Style Check Summary'

      - name: Create or Update Summary Comment
        if: steps.organize_imports.outputs.changes == 'true' || steps.lint_pretty.outputs.changes == 'true' || steps.license.outputs.changes == 'true' || steps.i18n.outputs.changes == 'true' || steps.docs.outputs.changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🔍 UI Style Check Summary

            One or more UI style checks have failed. Please run the indicated commands in `openmetadata-ui/src/main/resources/ui`:

            - **UI check style**
              - **Linting**
                - ${{ steps.lint_pretty.outputs.changes == 'true' && '❌' || '✅' }} **ESlint + Prettier** (`yarn lint:fix && yarn pretty`)
                - ${{ steps.organize_imports.outputs.changes == 'true' && '❌' || '✅' }} **Organise Import CLI** (`yarn organize-imports`)
                - ${{ steps.license.outputs.changes == 'true' && '❌' || '✅' }} **Licence header** (`yarn license-header-fix`)
              - ${{ steps.i18n.outputs.changes == 'true' && '❌' || '✅' }} **I18n sync** (`yarn i18n`)
              - ${{ steps.docs.outputs.changes == 'true' && '❌' || '✅' }} **generate:app-docs** (`yarn generate:app-docs`)
          edit-mode: replace

      - name: Delete Summary Comment if Passed
        if: steps.organize_imports.outputs.changes != 'true' && steps.lint_pretty.outputs.changes != 'true' && steps.license.outputs.changes != 'true' && steps.i18n.outputs.changes != 'true' && steps.docs.outputs.changes != 'true' && steps.fc.outputs.comment-id != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.fc.outputs.comment-id }}
            })

      - name: Fail if any check detected changes or failed
        if: steps.organize_imports.outputs.changes == 'true' || steps.lint_pretty.outputs.changes == 'true' || steps.license.outputs.changes == 'true' || steps.i18n.outputs.changes == 'true' || steps.docs.outputs.changes == 'true' || steps.organize_imports.outcome != 'success' || steps.lint_pretty.outcome != 'success' || steps.license.outcome != 'success' || steps.i18n.outcome != 'success' || steps.docs.outcome != 'success'
        run: |
          echo "One or more checkstyle steps introduced changes or did not complete successfully."
          exit 1