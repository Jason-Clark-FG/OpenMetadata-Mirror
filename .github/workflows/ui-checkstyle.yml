name: UI Checkstyle

on:
  workflow_dispatch:
  # Trigger analysis when creating or updating a pull request.
  pull_request_target:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "openmetadata-ui/src/main/resources/ui/**"
      - ".github/workflows/ui-checkstyle.yml"

permissions:
  contents: read

concurrency:
  group: ui-checkstyle-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Setup: install dependencies once, cache for all check jobs
  # ──────────────────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
          docker-images: false

      - name: Wait for the labeler
        uses: lewagon/wait-on-check-action@v1.3.4
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: Team Label
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 90

      - name: Verify PR labels
        uses: jesusvasquez333/verify-pr-label-action@v1.4.0
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          valid-labels: "safe to test"
          pull-request-number: "${{ github.event.pull_request.number }}"
          disable-reviews: true

      - name: Checkout
        uses: actions/checkout@v4
        if: success()
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Install Antlr4 CLI
        run: |
          sudo make install_antlr_cli

      - name: Install Yarn Packages
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # Check 1: ESLint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run ESLint
        id: lint
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn run lint

      - name: Comment on PR (ESLint failure)
        if: steps.lint.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ ESLint Check Failed

            Fix ESLint issues by running:
            ```bash
            cd openmetadata-ui/src/main/resources/ui
            yarn run lint:fix
            ```
            Then commit the changes to this PR.

            > 💡 Use [pre-commit](https://pre-commit.com/) hooks to automate this: `make install_test precommit_install`

      - name: Fail job if ESLint failed
        if: steps.lint.outcome != 'success'
        run: exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Check 2: Prettier
  # ──────────────────────────────────────────────────────────────────────────
  prettier:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Prettier Check
        id: prettier
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn run pretty:check

      - name: Comment on PR (Prettier failure)
        if: steps.prettier.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ Prettier Check Failed

            Fix Prettier formatting issues by running:
            ```bash
            cd openmetadata-ui/src/main/resources/ui
            yarn run pretty
            ```
            Then commit the changes to this PR.

            > 💡 Use [pre-commit](https://pre-commit.com/) hooks to automate this: `make install_test precommit_install`

      - name: Fail job if Prettier failed
        if: steps.prettier.outcome != 'success'
        run: exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Check 3: License Headers
  # ──────────────────────────────────────────────────────────────────────────
  license-header:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run License Header Check
        id: license-header
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn run license-header-check

      - name: Comment on PR (License Header failure)
        if: steps.license-header.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ License Header Check Failed

            One or more files are missing the required license header. Fix them by running:
            ```bash
            cd openmetadata-ui/src/main/resources/ui
            yarn run license-header-fix
            ```
            Then commit the changes to this PR.

            > 💡 Use [pre-commit](https://pre-commit.com/) hooks to automate this: `make install_test precommit_install`

      - name: Fail job if License Header check failed
        if: steps.license-header.outcome != 'success'
        run: exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Check 4: Organize Imports
  # ──────────────────────────────────────────────────────────────────────────
  organize-imports:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: openmetadata-ui/src/main/resources/ui/node_modules
          key: ui-node-modules-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Organize Imports Check
        id: organize-imports
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn run organize-imports:check

      - name: Comment on PR (Organize Imports failure)
        if: steps.organize-imports.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ Organize Imports Check Failed

            Fix import ordering issues by running:
            ```bash
            cd openmetadata-ui/src/main/resources/ui
            yarn run organize-imports
            ```
            Then commit the changes to this PR.

            > 💡 Use [pre-commit](https://pre-commit.com/) hooks to automate this: `make install_test precommit_install`

      - name: Fail job if Organize Imports check failed
        if: steps.organize-imports.outcome != 'success'
        run: exit 1
