# Nightly end-to-end SSO login tests.
#
# Purpose:
#   Drive real login round-trips through external identity providers and
#   validate the resulting OpenMetadata sessions. Complements
#   playwright-sso-tests.yml, which only exercises the SSO configuration
#   form UI without performing an actual login.
#
# Shape:
#   One job per provider. Each job declares `environment: test` so it can
#   resolve `${{ secrets.<PROVIDER>_SSO_PASSWORD }}` from the environment's
#   secrets with a STATIC reference (keeps CodeQL's "Excessive Secrets
#   Exposure" rule happy). All shared setup + test-run logic lives in the
#   composite action ./.github/actions/sso-login-run.
#
# Adding a new provider:
#   1. Add `<PROVIDER>_SSO_PASSWORD` as an environment secret and
#      `<PROVIDER>_SSO_USERNAME` + tenant vars in the `test` environment.
#   2. Add the provider to the `workflow_dispatch.inputs.sso_provider`
#      options list.
#   3. Copy the `okta` job below, rename it, and point its static secret
#      reference at `<PROVIDER>_SSO_PASSWORD`.
#   4. Register the provider helper in
#      openmetadata-ui/src/main/resources/ui/playwright/utils/sso-providers/index.ts.

name: SSO Login Nightly

on:
  schedule:
    # Every night at 03:00 UTC — runs every registered provider.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      sso_provider:
        description: 'SSO provider to test (or "all")'
        required: true
        default: okta
        type: choice
        options:
          - okta
          - all

permissions:
  contents: read

concurrency:
  group: sso-login-nightly-${{ github.event.inputs.sso_provider || 'scheduled' }}
  cancel-in-progress: true

jobs:
  okta:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.sso_provider == 'okta' ||
      github.event.inputs.sso_provider == 'all'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SSO Login Spec
        uses: ./.github/actions/sso-login-run
        with:
          provider: okta
          sso_password: ${{ secrets.OKTA_SSO_PASSWORD }}
          all_vars_json: ${{ toJSON(vars) }}
