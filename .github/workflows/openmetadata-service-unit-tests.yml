name: OpenMetadata Service Unit Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/openmetadata-service-unit-tests.yml"
      - ".github/workflows/openmetadata-service-unit-tests-skip.yml"
      - "openmetadata-service/**"
      - "openmetadata-spec/**"
      - "openmetadata-clients/**"
      - "openmetadata-sdk/**"
      - "common/**"
      - "pom.xml"
      - "Makefile"
      - "bootstrap/**"
  pull_request_target:
    types: [labeled, opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/openmetadata-service-unit-tests.yml"
      - ".github/workflows/openmetadata-service-unit-tests-skip.yml"
      - "openmetadata-service/**"
      - "openmetadata-spec/**"
      - "openmetadata-clients/**"
      - "openmetadata-sdk/**"
      - "common/**"
      - "pom.xml"
      - "Makefile"
      - "bootstrap/**"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: openmetadata-service-unit-tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  openmetadata-service-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NEW_CODE_COVERAGE_THRESHOLD: "90"
    if: ${{ github.event_name != 'pull_request_target' || !github.event.pull_request.draft }}
    steps:
      - name: Wait for the labeler
        uses: lewagon/wait-on-check-action@v1.3.4
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: Team Label
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Verify PR labels
        uses: jesusvasquez333/verify-pr-label-action@v1.4.0
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          valid-labels: "safe to test"
          pull-request-number: "${{ github.event.pull_request.number }}"
          disable-reviews: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Fetch PR base branch
        if: ${{ github.event_name == 'pull_request_target' }}
        run: git fetch --no-tags origin ${{ github.event.pull_request.base.ref }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev python3-venv librdkafka-dev gcc libsasl2-dev build-essential libssl-dev libffi-dev \
          librdkafka-dev unixodbc-dev libevent-dev jq
          sudo make install_antlr_cli

      - name: Run openmetadata-service unit tests with JaCoCo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B clean package -pl openmetadata-service -am \
            -Pstatic-code-analysis \
            -DfailIfNoTests=false \
            -Dsonar.skip=true

      - name: Generate JaCoCo report
        run: |
          mvn -B -pl openmetadata-service -Pstatic-code-analysis jacoco:report \
            -DskipTests \
            -Dsonar.skip=true

      - name: Evaluate new-code coverage
        id: diff-coverage
        if: ${{ github.event_name == 'pull_request_target' }}
        run: |
          python3 scripts/jacoco_diff_coverage.py \
            --report openmetadata-service/target/site/jacoco/jacoco.xml \
            --source-root openmetadata-service/src/main/java \
            --base-ref origin/${{ github.event.pull_request.base.ref }} \
            --head-ref HEAD \
            --minimum-coverage "${NEW_CODE_COVERAGE_THRESHOLD}" \
            --markdown-output openmetadata-service/target/diff-coverage.md

      - name: Add coverage summary to job summary
        if: ${{ always() && github.event_name == 'pull_request_target' && (steps.diff-coverage.outcome == 'success' || steps.diff-coverage.outcome == 'failure') }}
        run: cat openmetadata-service/target/diff-coverage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with coverage summary
        if: ${{ always() && github.event_name == 'pull_request_target' && (steps.diff-coverage.outcome == 'success' || steps.diff-coverage.outcome == 'failure') }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: openmetadata-service-new-code-coverage
          path: openmetadata-service/target/diff-coverage.md

      - name: Upload JaCoCo report
        if: ${{ always() && github.event_name == 'pull_request_target' }}
        uses: actions/upload-artifact@v4
        with:
          name: openmetadata-service-jacoco-report
          path: openmetadata-service/target/site/jacoco/

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openmetadata-service-surefire-reports
          path: openmetadata-service/target/surefire-reports/

      - name: Publish Test Report
        if: ${{ always() }}
        uses: scacap/action-surefire-report@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_test_failures: true
          report_paths: "openmetadata-service/target/surefire-reports/TEST-*.xml"
